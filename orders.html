<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders – L198</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#0a1f44;--navy-dark:#061530;--navy-mid:#122b5e;--navy-light:#1e3d7a;
    --accent:#1a73e8;--gold:#f0b429;--gray-100:#f5f7fa;--gray-200:#eaecf0;
    --gray-300:#d1d5db;--gray-500:#9ca3af;--gray-700:#4b5563;--gray-900:#111827;
    --shadow-sm:0 1px 4px rgba(10,31,68,0.08);--shadow-md:0 4px 16px rgba(10,31,68,0.12);
    --shadow-lg:0 8px 32px rgba(10,31,68,0.18);--radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--gray-100);color:var(--gray-900);font-size:14px;}
  a{text-decoration:none;color:inherit;}
  button{cursor:pointer;border:none;outline:none;font-family:inherit;}
  .topbar{background:var(--navy-dark);color:#fff;font-size:12px;padding:7px 0;text-align:center;}
  .topbar strong{color:var(--gold);margin:0 6px;}
  header{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-mid) 100%);position:sticky;top:0;z-index:1000;box-shadow:0 2px 16px rgba(6,21,48,0.4);}
  .header-inner{max-width:1260px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:18px;height:66px;}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .logo-box{width:44px;height:44px;background:var(--gold);border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;color:var(--navy-dark);}
  .logo-text{color:#fff;font-weight:800;font-size:22px;}
  .logo-text span{color:var(--gold);}
  .search-bar{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.97);border-radius:10px;overflow:hidden;height:42px;max-width:660px;}
  .search-bar input{flex:1;border:none;outline:none;padding:0 16px;font-size:13.5px;font-family:inherit;}
  .search-btn{background:var(--accent);color:#fff;height:100%;width:50px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .header-actions{display:flex;align-items:center;gap:4px;margin-left:auto;}
  .hdr-btn{display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,0.9);background:none;padding:6px 11px;border-radius:9px;font-size:11px;min-width:54px;}
  .hdr-btn:hover{background:rgba(255,255,255,0.12);}
  .hdr-btn .icon{font-size:20px;}
  .main-wrap{max-width:900px;margin:0 auto;padding:28px 24px 56px;}
  .page-title{font-size:22px;font-weight:800;margin-bottom:20px;}

  /* Filter tabs */
  .order-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .tab-btn{padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-700);transition:all .2s;}
  .tab-btn:hover,.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}

  /* Order cards */
  .order-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);margin-bottom:16px;overflow:hidden;border:1.5px solid transparent;transition:border-color .2s;}
  .order-card:hover{border-color:var(--navy);}
  .order-header-bar{background:var(--gray-100);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);}
  .order-id-text{font-size:13px;font-weight:700;color:var(--gray-700);}
  .order-date-text{font-size:12px;color:var(--gray-500);}
  .order-status{font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;}
  .status-pending,.status-confirmed,.status-processing{background:#eff6ff;color:#1d4ed8;}
  .status-shipped{background:#fff8e1;color:#d97706;}
  .status-delivered{background:#f0fdf4;color:#16a34a;}
  .status-cancelled,.status-refunded{background:#fef2f2;color:#dc2626;}

  .order-body{padding:16px 20px;}
  .order-item-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--gray-100);}
  .order-item-row:last-child{border:none;}
  .item-img{width:52px;height:52px;border-radius:9px;background:linear-gradient(135deg,#e8f0fe,#c2d4fb);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;}
  .item-img img{width:100%;height:100%;object-fit:cover;}
  .item-name{flex:1;font-size:13px;font-weight:500;line-height:1.4;}
  .item-price{font-size:14px;font-weight:700;color:var(--navy);}
  .item-qty{font-size:12px;color:var(--gray-500);}

  .order-footer-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--gray-200);}
  .order-total-text{font-size:14px;font-weight:700;}
  .order-actions{display:flex;gap:8px;}
  .action-btn{font-size:12px;font-weight:600;padding:7px 16px;border-radius:8px;cursor:pointer;transition:all .2s;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-primary:hover{background:var(--navy-light);}
  .btn-outline{background:none;border:1.5px solid var(--gray-200);color:var(--gray-700);}
  .btn-outline:hover{border-color:var(--navy);color:var(--navy);}
  .btn-danger{background:none;border:1.5px solid #fecaca;color:#dc2626;}

  /* Tracking detail (expandable) */
  .tracking-panel{display:none;padding:20px;background:#f9fafb;border-top:1px solid var(--gray-200);}
  .tracking-panel.open{display:block;}
  .track-timeline{padding-left:32px;position:relative;}
  .track-timeline::before{content:'';position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:var(--gray-200);}
  .track-step{position:relative;margin-bottom:20px;}
  .track-dot{position:absolute;left:-32px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--gray-300);background:#fff;top:0;}
  .track-step.done .track-dot{background:#16a34a;border-color:#16a34a;color:#fff;}
  .track-step.current .track-dot{background:var(--accent);border-color:var(--accent);color:#fff;}
  .track-title{font-size:13px;font-weight:700;color:var(--gray-900);}
  .track-step.pending .track-title{color:var(--gray-400);}
  .track-time{font-size:11px;color:var(--gray-500);margin-top:2px;}

  .empty-state{text-align:center;padding:80px 20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);}
  .empty-state .icon{font-size:64px;margin-bottom:16px;}
  .loading-state{text-align:center;padding:60px;color:var(--gray-500);}

  footer{background:var(--navy-dark);color:#aab4c8;padding:28px 0 18px;margin-top:20px;}
  .footer-inner{max-width:1260px;margin:0 auto;padding:0 24px;}
  .footer-bottom{display:flex;align-items:center;justify-content:space-between;}
  .footer-bottom p{font-size:12px;color:#4a5f7a;}
  .toast{position:fixed;top:84px;right:22px;background:var(--navy-dark);color:#fff;padding:13px 20px;border-radius:11px;font-size:13px;box-shadow:var(--shadow-lg);z-index:9999;display:flex;align-items:center;gap:10px;transform:translateX(120%);transition:transform .3s ease;border-left:3px solid var(--gold);}
  .toast.show{transform:translateX(0);}
</style>
</head>
<body>
<div class="topbar"><span>🚀 Free delivery within Phnom Penh 1–2 hours!</span><strong>|</strong><span>📞 Customer Service: 016 955 598 (8AM–11PM)</span></div>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-box">L1</div><span class="logo-text">L<span>198</span></span></a>
    <div class="search-bar"><input type="text" placeholder="Search products, stores, brands..."><button class="search-btn">🔍</button></div>
    <div class="header-actions">
      <button class="hdr-btn"><span class="icon">🔔</span><span>Alerts</span></button>
      <a href="cart.html" class="hdr-btn"><span class="icon">🛒</span><span>Cart</span></a>
      <a href="profile.html" class="hdr-btn"><span class="icon">👤</span><span class="user-name">Account</span></a>
    </div>
  </div>
</header>

<div class="main-wrap">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <a href="profile.html" style="color:var(--accent);font-size:13px;font-weight:600;">← My Account</a>
    <span style="color:var(--gray-300);">›</span>
    <div class="page-title" style="margin:0;">📦 My Orders</div>
  </div>

  <div class="order-tabs">
    <button class="tab-btn active" onclick="filterOrders(this,'all')">All Orders</button>
    <button class="tab-btn" onclick="filterOrders(this,'processing')">🚀 Active</button>
    <button class="tab-btn" onclick="filterOrders(this,'shipped')">🚚 Shipped</button>
    <button class="tab-btn" onclick="filterOrders(this,'delivered')">✅ Delivered</button>
    <button class="tab-btn" onclick="filterOrders(this,'cancelled')">❌ Cancelled</button>
  </div>

  <div id="ordersList"><div class="loading-state">⏳ Loading your orders...</div></div>
</div>

<footer><div class="footer-inner"><div class="footer-bottom"><p>© 2010–2025 L198.COM · Little Digital (Cambodia) Co., Ltd.</p></div></div></footer>
<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg">Done!</span></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let allOrders = [];
let currentFilter = 'all';
let activeSubscriptions = [];

const STATUS_STEPS = ['pending','confirmed','processing','shipped','delivered'];

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await requireAuth('login.html');
  await loadOrders();
})();

async function loadOrders() {
  try {
    allOrders = await getOrders();
    // Subscribe to real-time updates for active orders
    allOrders.forEach(order => {
      if (['pending','confirmed','processing','shipped'].includes(order.status)) {
        const sub = subscribeToOrder(order.id, (updated) => {
          const idx = allOrders.findIndex(o => o.id === updated.id);
          if (idx !== -1) { allOrders[idx] = { ...allOrders[idx], ...updated }; renderOrders(); }
        });
        activeSubscriptions.push(sub);
      }
    });
    renderOrders();
  } catch (e) {
    document.getElementById('ordersList').innerHTML = '<div class="loading-state">❌ Failed to load orders. Please refresh.</div>';
  }
}

function filterOrders(btn, filter) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderOrders();
}

function renderOrders() {
  const el = document.getElementById('ordersList');
  let filtered = allOrders;
  if (currentFilter !== 'all') {
    const activeStatuses = ['pending','confirmed','processing'];
    if (currentFilter === 'processing') filtered = allOrders.filter(o => activeStatuses.includes(o.status));
    else filtered = allOrders.filter(o => o.status === currentFilter);
  }

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h3 style="font-size:18px;font-weight:700;margin-bottom:8px;">No orders found</h3><p style="color:var(--gray-500);margin-bottom:20px;">${currentFilter === 'all' ? "You haven't placed any orders yet." : 'No orders in this category.'}</p><a href="index.html" style="background:var(--navy);color:#fff;padding:12px 28px;border-radius:10px;font-weight:700;font-size:14px;">Shop Now →</a></div>`;
    return;
  }

  el.innerHTML = filtered.map(order => `
    <div class="order-card">
      <div class="order-header-bar">
        <div>
          <div class="order-id-text">Order #${order.id.slice(0,8).toUpperCase()}</div>
          <div class="order-date-text">${new Date(order.created_at).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</div>
        </div>
        <span class="order-status status-${order.status}">${formatStatus(order.status)}</span>
      </div>

      <div class="order-body">
        ${(order.items || []).map(item => `
          <div class="order-item-row">
            <div class="item-img">${item.product_image_url ? `<img src="${item.product_image_url}" alt="">` : '🛍️'}</div>
            <div class="item-name">${item.product_name}</div>
            <div class="item-qty">×${item.quantity}</div>
            <div class="item-price">$${Number(item.unit_price).toFixed(2)}</div>
          </div>`).join('')}

        ${isActive(order.status) ? `
        <div class="track-timeline" style="margin-top:16px;">
          ${STATUS_STEPS.map(s => {
            const idx = STATUS_STEPS.indexOf(s);
            const curIdx = STATUS_STEPS.indexOf(order.status);
            const cls = idx < curIdx ? 'done' : idx === curIdx ? 'current' : 'pending';
            return `<div class="track-step ${cls}">
              <div class="track-dot">${idx < curIdx ? '✓' : idx === curIdx ? '▶' : '○'}</div>
              <div class="track-title">${formatStatus(s)}</div>
            </div>`;
          }).join('')}
        </div>` : ''}
      </div>

      <div class="order-footer-bar">
        <div class="order-total-text">Total: $${Number(order.total).toFixed(2)}</div>
        <div class="order-actions">
          ${order.status === 'delivered'
            ? `<button class="action-btn btn-outline" onclick="showToast('Review feature coming soon!','⭐')">⭐ Review</button>
               <button class="action-btn btn-primary" onclick="showToast('Reorder feature coming soon!','🔄')">🔄 Reorder</button>`
            : isActive(order.status)
              ? `<button class="action-btn btn-danger" onclick="requestCancel('${order.id}')">✕ Cancel</button>`
              : ''}
          <button class="action-btn btn-outline" onclick="showToast('Receipt download coming soon!','📄')">📄 Receipt</button>
        </div>
      </div>
    </div>`).join('');
}

function formatStatus(s) {
  const map = { pending:'⏳ Pending', confirmed:'✅ Confirmed', processing:'⚙️ Processing', shipped:'🚚 Shipped', delivered:'✅ Delivered', cancelled:'❌ Cancelled', refunded:'↩️ Refunded' };
  return map[s] || s;
}

function isActive(s) { return ['pending','confirmed','processing','shipped'].includes(s); }

async function requestCancel(orderId) {
  if (!confirm('Request cancellation for this order?')) return;
  try {
    await db.from('orders').update({ status: 'cancelled' }).eq('id', orderId);
    await loadOrders();
    showToast('Cancellation requested', '❌');
  } catch (e) { showToast('Failed to cancel', '❌'); }
}
</script>
</body>
</html>
